name: CI

# Job id contract — stable YAML `jobs:` keys relied on by docs, `act`, and anchors:
# `release-manifest-ssot`, `release-gate`, `phase18-tax-gate`, `admin-drift-docs`,
# `host-integration`, `annotation-sweep`, `live-stripe`.
# Merge-blocking on pull_request: `release-manifest-ssot`, `release-gate`,
# `phase18-tax-gate`, `admin-drift-docs`, `host-integration`, `annotation-sweep`.
# Advisory: `live-stripe` (Stripe test-mode parity) runs on `workflow_dispatch` and
# `schedule` only — not merge-blocking for PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Daily 06:00 UTC — runs the advisory live-stripe job only, not the
    # default test matrix. See the `live-stripe` job below and
    # `guides/testing-live-stripe.md`.
    - cron: '0 6 * * *'

permissions:
  actions: read
  checks: read
  contents: read

jobs:
  release-manifest-ssot:
    name: Release manifest SSOT (REL-02)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Verify Release Please manifest ↔ mix.exs @version
        run: bash scripts/ci/verify_release_manifest_alignment.sh

  release-gate:
    name: Release gate (${{ matrix.compatibility }}; elixir=${{ matrix.elixir }} otp=${{ matrix.otp }} sigra=${{ matrix.sigra }} opentelemetry=${{ matrix.opentelemetry }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor — minimum supported compatibility cell.
          # Required deterministic gate: high-severity trust findings block release here.
          - elixir: '1.17.3'
            otp: '27.0'
            sigra: 'off'
            opentelemetry: 'off'
            compatibility: 'Floor'
            support: 'required'
            continue-on-error: false
          # Primary dev target compatibility cell.
          # Required deterministic gate: high-severity trust findings block release here.
          - elixir: '1.18.0'
            otp: '27.0'
            sigra: 'off'
            opentelemetry: 'off'
            compatibility: 'Primary dev target'
            support: 'required'
            continue-on-error: false
          # Forward-compat smoke compatibility cell (still required while within the documented support contract).
          # Required deterministic gate: high-severity trust findings block release here.
          - elixir: '1.18.4'
            otp: '28.0'
            sigra: 'off'
            opentelemetry: 'off'
            compatibility: 'Forward-compat smoke'
            support: 'required'
            continue-on-error: false
          # Advisory compatibility cell: unpublished optional :sigra integration.
          # Advisory cells stay visibly non-blocking through matrix continue-on-error.
          - elixir: '1.18.0'
            otp: '27.0'
            sigra: 'on'
            opentelemetry: 'off'
            compatibility: 'Primary dev target'
            support: 'advisory'
            continue-on-error: true
          # Required compatibility cell: optional OpenTelemetry integration is supported and stays blocking.
          - elixir: '1.18.0'
            otp: '27.0'
            sigra: 'off'
            opentelemetry: 'on'
            compatibility: 'Primary dev target'
            support: 'required'
            continue-on-error: false

    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      ACCRUE_CI_SIGRA: ${{ matrix.sigra == 'on' && '1' || '' }}
      ACCRUE_CI_OPENTELEMETRY: ${{ matrix.opentelemetry == 'on' && '1' || '' }}
      ACCRUE_OTEL_MATRIX: ${{ matrix.opentelemetry == 'on' && 'with_opentelemetry' || 'without_opentelemetry' }}

    # Required cells remain release-blocking; only clearly labeled advisory cells may use continue-on-error.
    continue-on-error: ${{ matrix.continue-on-error }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Install Hex
        run: mix local.hex --force

      - name: Restore accrue deps cache
        uses: actions/cache@v5
        with:
          path: accrue/deps
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ matrix.sigra }}-${{ matrix.opentelemetry }}-deps-${{ hashFiles('accrue/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ matrix.sigra }}-${{ matrix.opentelemetry }}-deps-

      - name: Install accrue deps
        run: cd accrue && mix deps.get

      - name: Accrue format
        run: cd accrue && mix format --check-formatted

      - name: Accrue compile
        run: cd accrue && mix compile --warnings-as-errors

      - name: Accrue test
        run: cd accrue && mix test --warnings-as-errors

      - name: Accrue credo
        run: cd accrue && mix credo --strict

      # --- Dialyzer with split restore/save PLT cache (CLAUDE.md recipe) ---
      - name: Restore accrue PLT cache
        id: accrue_plt_cache
        uses: actions/cache/restore@v5
        with:
          path: accrue/_build/test/*.plt*
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ matrix.sigra }}-${{ matrix.opentelemetry }}-plt-${{ hashFiles('accrue/mix.lock') }}

      - name: Create accrue PLTs
        if: steps.accrue_plt_cache.outputs.cache-hit != 'true'
        run: |
          set +e
          cd accrue
          output=$(mix dialyzer --plt --quiet 2>&1)
          status=$?
          printf '%s\n' "$output" | grep -Ev '^xmerl_ucs\.erl:[0-9]+:[0-9]+: Warning: missing specification for function ' || true
          exit "$status"

      - name: Save accrue PLT cache
        if: steps.accrue_plt_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: accrue/_build/test/*.plt*
          key: ${{ steps.accrue_plt_cache.outputs.cache-primary-key }}

      - name: Accrue dialyzer
        run: cd accrue && mix dialyzer --format github

      - name: Accrue docs
        run: cd accrue && MIX_ENV=dev mix docs --warnings-as-errors

      - name: Accrue retired package audit
        run: cd accrue && mix hex.audit

      - name: Restore accrue_admin deps cache
        uses: actions/cache@v5
        with:
          path: accrue_admin/deps
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ matrix.sigra }}-${{ matrix.opentelemetry }}-accrue-admin-deps-${{ hashFiles('accrue_admin/mix.lock', 'accrue/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ matrix.sigra }}-${{ matrix.opentelemetry }}-accrue-admin-deps-

      - name: Install accrue_admin deps
        run: cd accrue_admin && mix deps.get

      - name: Accrue admin format
        run: cd accrue_admin && mix format --check-formatted

      - name: Accrue admin compile
        run: cd accrue_admin && mix compile --warnings-as-errors

      - name: Accrue admin test
        run: cd accrue_admin && mix test --warnings-as-errors

      - name: Accrue admin credo
        run: cd accrue_admin && mix credo --strict

      - name: Restore accrue_admin PLT cache
        id: accrue_admin_plt_cache
        uses: actions/cache/restore@v5
        with:
          path: accrue_admin/priv/plts
          key: ${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ matrix.sigra }}-${{ matrix.opentelemetry }}-accrue-admin-plt-${{ hashFiles('accrue_admin/mix.lock', 'accrue/mix.lock') }}

      - name: Create accrue_admin PLTs
        if: steps.accrue_admin_plt_cache.outputs.cache-hit != 'true'
        run: |
          set +e
          cd accrue_admin
          output=$(mix dialyzer --plt --quiet 2>&1)
          status=$?
          printf '%s\n' "$output" | grep -Ev '^xmerl_ucs\.erl:[0-9]+:[0-9]+: Warning: missing specification for function ' || true
          exit "$status"

      - name: Save accrue_admin PLT cache
        if: steps.accrue_admin_plt_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: accrue_admin/priv/plts
          key: ${{ steps.accrue_admin_plt_cache.outputs.cache-primary-key }}

      - name: Accrue admin dialyzer
        run: cd accrue_admin && mix dialyzer --format github

      - name: Accrue admin docs
        run: cd accrue_admin && MIX_ENV=dev mix docs --warnings-as-errors

      - name: Accrue admin retired package audit
        run: cd accrue_admin && mix hex.audit

  phase18-tax-gate:
    name: Phase 18 Stripe Tax gate
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost

    steps:
      - uses: actions/checkout@v6

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.18.0'

      - name: Install Hex
        run: mix local.hex --force

      - name: Restore accrue deps cache
        uses: actions/cache@v5
        with:
          path: accrue/deps
          key: ${{ runner.os }}-otp27-elixir118-phase18-tax-deps-${{ hashFiles('accrue/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp27-elixir118-phase18-tax-deps-

      - name: Install accrue deps
        run: cd accrue && mix deps.get

      - name: Run Phase 18 Stripe Tax gate
        run: cd accrue && mix test test/accrue/billing/invoice_projection_test.exs test/accrue/billing/subscription_projection_tax_test.exs test/accrue/billing/subscription_test.exs test/accrue/checkout_test.exs test/accrue/processor/fake_test.exs test/accrue/processor/stripe_test.exs

  admin-drift-docs:
    name: Admin drift and docs
    if: github.event_name != 'schedule'
    needs: [release-gate]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.18.0'

      - name: Install Hex
        run: mix local.hex --force

      - name: Install deps
        run: cd accrue_admin && mix deps.get

      - name: Rebuild package assets
        run: cd accrue_admin && mix accrue_admin.assets.build

      - name: Ensure committed bundle is fresh
        run: git diff --exit-code -- accrue_admin/priv/static/accrue_admin.css accrue_admin/priv/static/accrue_admin.js

      - name: Verify guide mentions mount path and asset task
        run: |
          grep -q 'accrue_admin "/billing"' accrue_admin/guides/admin_ui.md
          grep -q 'accrue_admin.assets.build' accrue_admin/guides/admin_ui.md

  host-integration:
    # Phoenix/LiveView compatibility proof for Phase 15:
    # host-integration proves Phoenix 1.8 / LiveView 1.1 by running the seeded host app
    # pinned in examples/accrue_host/mix.exs and accrue_admin/mix.exs. Keep this as the
    # single host-level proof instead of creating a second compatibility matrix.
    # Required deterministic gate for TRUST-02 and TRUST-04:
    # trust review, seeded performance smoke, and browser accessibility/responsive checks
    # stay in this lane, and high-severity trust findings cannot be accepted here.
    name: Host integration (required deterministic gate)
    if: github.event_name != 'schedule'
    needs: [admin-drift-docs]
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      ACCRUE_HOST_PORT: 4100
      ACCRUE_HOST_BROWSER_PORT: 4101
      ACCRUE_HOST_BROWSER_LOG: ${{ github.workspace }}/accrue-host-server.log

    steps:
      - uses: actions/checkout@v6

      - name: VERIFY-01 README contract (shift-left)
        run: bash scripts/ci/verify_verify01_readme_contract.sh

      - name: ORG-09 adoption proof matrix literals
        run: bash scripts/ci/verify_adoption_proof_matrix.sh

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.18.0'

      - name: Install Hex
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: examples/accrue_host/package-lock.json

      - name: Restore host deps cache
        uses: actions/cache@v5
        with:
          path: examples/accrue_host/deps
          key: ${{ runner.os }}-otp27-elixir118-accrue-host-deps-${{ hashFiles('examples/accrue_host/mix.lock', 'accrue/mix.lock', 'accrue_admin/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp27-elixir118-accrue-host-deps-

      - name: Install host deps
        run: cd examples/accrue_host && mix deps.get

      - name: Install browser deps
        run: cd examples/accrue_host && npm ci

      - name: Install Chromium
        run: cd examples/accrue_host && npm run e2e:install

      - name: Run host integration gate
        # Canonical trust lane: seeded performance smoke + browser accessibility/responsive checks.
        run: bash scripts/ci/accrue_host_uat.sh

      - name: Run host Hex smoke
        # Release Please PRs bump the example to the next Hex version before it is published;
        # path-based host integration above already validates the branch. Hex smoke runs on
        # merge to main (and other PRs) against the published package.
        if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') }}
        run: bash scripts/ci/accrue_host_hex_smoke.sh

      - name: Upload Playwright report
        # Heavy debugging artifact stays failure-only.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: accrue-host-playwright-report
          path: examples/accrue_host/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces
        # Heavy debugging artifact stays failure-only.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: accrue-host-playwright-traces
          path: examples/accrue_host/test-results
          if-no-files-found: ignore

      - name: Upload Phase 15 trust screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accrue-host-phase15-screenshots
          path: examples/accrue_host/test-results/phase15-trust
          if-no-files-found: ignore

      - name: Upload host server log
        # Heavy debugging artifact stays failure-only.
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: accrue-host-server-log
          path: ${{ github.workspace }}/accrue-host-server.log
          if-no-files-found: ignore

  annotation-sweep:
    name: Annotation sweep
    if: github.event_name != 'schedule'
    needs:
      [
        release-manifest-ssot,
        release-gate,
        phase18-tax-gate,
        admin-drift-docs,
        host-integration,
      ]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Sweep release-facing annotations
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          bash scripts/ci/annotation_sweep.sh release-manifest-ssot release-gate
          phase18-tax-gate admin-drift-docs host-integration

  # ---------------------------------------------------------------------
  # Advisory live-Stripe fidelity job (quick task 260414-l9q).
  #
  # Runs ONLY on manual workflow_dispatch and on the 06:00 UTC cron.
  # Never runs on push or pull_request. `continue-on-error: true` makes
  # it advisory so Stripe API flakes do not block main CI.
  #
  # Requires STRIPE_TEST_SECRET_KEY to be configured as a repository
  # secret. Individual tests skip cleanly in setup_all when the secret
  # is absent.
  #
  # See guides/testing-live-stripe.md for details.
  # ---------------------------------------------------------------------
  live-stripe:
    # Job id stays `live-stripe` for `act -j live-stripe` compatibility; display
    # name reflects Stripe *test mode* keys (`STRIPE_TEST_SECRET_KEY`), not live mode.
    name: Stripe test-mode parity (advisory)
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    continue-on-error: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      ACCRUE_LIVE_BASIC_PRICE: ${{ secrets.ACCRUE_LIVE_BASIC_PRICE }}
      ACCRUE_LIVE_PRO_PRICE: ${{ secrets.ACCRUE_LIVE_PRO_PRICE }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.18.0'

      - name: Install Hex
        run: mix local.hex --force

      - name: Install deps
        run: cd accrue && mix deps.get

      - name: Compile
        run: cd accrue && mix compile

      - name: Create + migrate test DB
        run: |
          cd accrue
          mix ecto.create
          mix ecto.migrate

      - name: Run live-Stripe suite
        run: cd accrue && mix test.live

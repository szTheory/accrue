name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap_release_as:
        description: 'Bootstrap note: use Release-As: 1.0.0 for both package paths before the first public publish.'
        required: false
        default: '1.0.0'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      accrue_release_created: ${{ steps.release.outputs.accrue_release_created }}
      accrue_tag_name: ${{ steps.release.outputs.accrue_tag_name }}
      accrue_version: ${{ steps.release.outputs.accrue_version }}
      accrue_sha: ${{ steps.release.outputs.accrue_sha }}
      accrue_admin_release_created: ${{ steps.release.outputs.accrue_admin_release_created }}
      accrue_admin_tag_name: ${{ steps.release.outputs.accrue_admin_tag_name }}
      accrue_admin_version: ${{ steps.release.outputs.accrue_admin_version }}
      accrue_admin_sha: ${{ steps.release.outputs.accrue_admin_sha }}
    steps:
      - name: Bootstrap reminder
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "Bootstrap reminder: carry Release-As: 1.0.0 for accrue and accrue_admin before the first public publish." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Release Please
        id: release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          NPM_CONFIG_LOGLEVEL: error
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          target_branch="${GITHUB_REF_NAME}"
          release_please="npx --yes release-please@17.6.0"

          release_exists() {
            gh release view "$1" --repo "$repo" >/dev/null 2>&1
          }

          write_release_outputs() {
            local output_prefix="$1"
            local manifest_path="$2"
            local before_release="$3"
            local version tag_name after_release tag_sha

            version="$(jq -r --arg path "$manifest_path" '.[$path] // empty' .release-please-manifest.json)"
            tag_name="${manifest_path}-v${version}"

            if [ -n "$version" ] && release_exists "$tag_name"; then
              after_release="true"
            else
              after_release="false"
            fi

            if [ "$before_release" = "false" ] && [ "$after_release" = "true" ]; then
              git fetch --force --tags origin "refs/tags/$tag_name:refs/tags/$tag_name"
              tag_sha="$(git rev-list -n 1 "$tag_name")"
              {
                echo "${output_prefix}_release_created=true"
                echo "${output_prefix}_tag_name=$tag_name"
                echo "${output_prefix}_version=$version"
                echo "${output_prefix}_sha=$tag_sha"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "${output_prefix}_release_created=false"
                echo "${output_prefix}_tag_name=$tag_name"
                echo "${output_prefix}_version=$version"
                echo "${output_prefix}_sha="
              } >> "$GITHUB_OUTPUT"
            fi
          }

          accrue_version="$(jq -r '.accrue // empty' .release-please-manifest.json)"
          accrue_admin_version="$(jq -r '.accrue_admin // empty' .release-please-manifest.json)"
          accrue_tag="accrue-v${accrue_version}"
          accrue_admin_tag="accrue_admin-v${accrue_admin_version}"

          if [ -n "$accrue_version" ] && release_exists "$accrue_tag"; then
            accrue_release_before="true"
          else
            accrue_release_before="false"
          fi

          if [ -n "$accrue_admin_version" ] && release_exists "$accrue_admin_tag"; then
            accrue_admin_release_before="true"
          else
            accrue_admin_release_before="false"
          fi

          $release_please github-release \
            --repo-url "$repo" \
            --target-branch "$target_branch" \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json \
            --token "$RELEASE_PLEASE_TOKEN"

          write_release_outputs "accrue" "accrue" "$accrue_release_before"
          write_release_outputs "accrue_admin" "accrue_admin" "$accrue_admin_release_before"

          $release_please release-pr \
            --repo-url "$repo" \
            --target-branch "$target_branch" \
            --config-file release-please-config.json \
            --manifest-file .release-please-manifest.json \
            --token "$RELEASE_PLEASE_TOKEN"

  publish-accrue:
    name: Publish accrue
    needs: release
    if: ${{ needs.release.outputs.accrue_release_created == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.accrue_sha }}
      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.18.0'
      - name: Install Hex
        run: mix local.hex --force
      - name: Install accrue deps
        run: cd accrue && mix deps.get
      - name: Verify accrue release version
        run: grep -n "@version \"${{ needs.release.outputs.accrue_version }}\"" accrue/mix.exs
      - name: Dry run accrue Hex publish
        run: cd accrue && mix hex.publish --dry-run
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
      - name: Publish accrue to Hex
        run: cd accrue && mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  publish-accrue-admin:
    name: Publish accrue_admin
    needs: [release, publish-accrue]
    if: ${{ always() && needs.release.outputs.accrue_admin_release_created == 'true' && (needs.release.outputs.accrue_release_created != 'true' || needs.publish-accrue.result == 'success') }}
    runs-on: ubuntu-24.04
    env:
      ACCRUE_ADMIN_HEX_RELEASE: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.accrue_admin_sha }}
      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.0'
          elixir-version: '1.18.0'
      - name: Install Hex
        run: mix local.hex --force
      - name: Install accrue_admin deps
        run: cd accrue_admin && mix deps.get
      - name: Verify accrue_admin release version
        run: grep -n "@version \"${{ needs.release.outputs.accrue_admin_version }}\"" accrue_admin/mix.exs
      - name: Dry run accrue_admin Hex publish
        run: cd accrue_admin && mix hex.publish --dry-run
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          ACCRUE_ADMIN_HEX_RELEASE: ${{ env.ACCRUE_ADMIN_HEX_RELEASE }}
      - name: Publish accrue_admin to Hex
        run: cd accrue_admin && mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
          ACCRUE_ADMIN_HEX_RELEASE: ${{ env.ACCRUE_ADMIN_HEX_RELEASE }}

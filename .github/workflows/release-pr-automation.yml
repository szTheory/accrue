# Queues GitHub auto-merge (merge commit) for a release PR **after** explicit maintainer intent.
#
# Billing-adjacent releases require a **human merge** or this **workflow_dispatch** step:
# a maintainer reviews the Release Please PR, signs the checklist, then runs this workflow
# with the PR number so `gh pr merge --merge --auto` runs only when they choose.
#
# Optional: use `scripts/ci/gh_merge_release_pr.sh` to discover the open Release Please PR number.
#
# Repo settings that must be enabled for this to take effect:
#   - Settings → General → Allow auto-merge
#   - Branch rules must not block auto-merge indefinitely (or merge manually instead).
name: Release PR automation

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to queue for merge when green (merge commit)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr-automation-${{ github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  queue-merge-when-green:
    name: Queue merge when checks pass
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          set -euo pipefail
          echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (merge commit)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr merge "${{ steps.pr.outputs.number }}" --merge --auto --repo "${{ github.repository }}"
